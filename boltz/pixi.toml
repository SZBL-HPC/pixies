[workspace]
authors = ["HU Xuesong <87519979+huxs001@users.noreply.github.com>"]
channels = ["conda-forge", "bioconda"]
name = "boltz"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
ins = 'pip install boltz'

[dependencies]
biopython = "1.84.*"
pip = ">=26.0.1,<27"
c-compiler = ">=1.11.0,<2"
cmake = ">=4.3.1,<5"
cxx-compiler = ">=1.11.0,<2"
ninja = ">=1.13.2,<2"
numpy = "1.26.4.*"
zlib = ">=1.3.2,<2"
pkg-config = ">=0.29.2,<0.30"
openblas = ">=0.3.32,<0.4"
cuda-runtime = "12.*"
cuda-version = "12.*"
pytorch-lightning = "2.5.0.*"
hydra-core = "1.3.2.*"
pandas = ">=2.2.2"
einops = "0.8.0.*"
einx = "0.3.0.*"
mashumaro = "3.14.*"
modelcif = "1.2.*"
wandb = "0.18.7.*"
click = "8.1.7.*"
pyyaml = "6.0.2.*"
scipy = "1.13.1.*"
numba = "0.61.0.*"
gemmi = "0.6.5.*"
scikit-learn = "1.6.1.*"
chembl_structure_pipeline = "1.2.2.*"
dm-tree = "0.1.8.*"
requests = "2.32.3.*"
types-requests = ">=2.33.0.20260327,<3"
cuequivariance-torch = ">=0.9.1,<0.10"

[system-requirements]
cuda = "12"

